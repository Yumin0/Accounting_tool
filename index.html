<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記帳工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; background: #F2F4F8; color: #1C1C1E; font-size: 15px; }

    /* ── Header ── */
    .header {
      background: #1E3A5F; color: white;
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
    .month-nav { display: flex; align-items: center; gap: 10px; }
    .month-nav button {
      background: rgba(255,255,255,0.15); border: none; color: white;
      width: 32px; height: 32px; border-radius: 8px;
      cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .month-nav button:hover { background: rgba(255,255,255,0.28); }
    .month-nav span { font-size: 15px; font-weight: 600; min-width: 76px; text-align: center; }

    /* ── Summary ── */
    .summary {
      display: flex; gap: 8px; padding: 12px 14px;
      background: white; border-bottom: 1px solid #E2E8F0;
    }
    .summary-card {
      flex: 1; text-align: center; padding: 10px 4px;
      border-radius: 10px; background: #F8FAFC;
      border: 1px solid #EEF1F5;
    }
    .summary-card .label { font-size: 12px; color: #6B7280; margin-bottom: 5px; }
    .summary-card .value { font-size: 17px; font-weight: 700; }
    .value.expense { color: #EF4444; }
    .value.income  { color: #16A34A; }
    .value.saving  { color: #2563EB; }

    /* ── Calendar ── */
    .calendar { padding: 0 10px 8px; background: white; }

    .month-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      padding: 8px 0 4px; border-bottom: 1px solid #E5E5EA;
    }
    .month-weekday {
      text-align: center; font-size: 12px;
      color: #8E8E93; font-weight: 600;
    }

    .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); }

    .week-row-line {
      grid-column: 1 / -1; height: 1px; background: #E5E5EA;
    }

    .month-day {
      min-height: 72px; padding: 6px 3px 4px;
      background: white; cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      transition: background 0.1s;
    }
    .month-day:hover:not(.empty-cell):not(.future) { background: #F0F7FF; }
    .month-day.empty-cell { cursor: default; }
    .month-day.future     { cursor: default; }

    .d-num {
      font-size: 14px; font-weight: 500; color: #1C1C1E;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .month-day.today .d-num  { background: #EF4444; color: white; font-weight: 700; }
    .month-day.future .d-num { color: #C7C7CC; }
    .month-day.empty-cell .d-num { visibility: hidden; }

    .d-content { width: 100%; margin-top: 3px; display: flex; flex-direction: column; gap: 2px; }
    .d-exp, .d-inc {
      display: block; width: 100%; font-size: 11px; font-weight: 600;
      border-radius: 4px; padding: 1px 3px; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .d-exp { background: #FEE2E2; color: #DC2626; }
    .d-inc { background: #DCFCE7; color: #16A34A; }

    /* ── Detail Panel ── */
    .detail-panel {
      background: white; border-radius: 12px;
      margin: 10px 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: 1px solid #E5E5EA;
    }
    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px 10px; border-bottom: 1px solid #F1F5F9;
      background: #F8FAFC;
    }
    .detail-date { font-size: 14px; font-weight: 700; color: #1E3A5F; }
    .detail-actions { display: flex; gap: 6px; }

    .detail-item {
      display: flex; align-items: center;
      padding: 11px 14px; border-bottom: 1px solid #F8FAFC;
    }
    .detail-item:last-child { border-bottom: none; }
    .detail-item:hover { background: #FAFBFC; }

    .di-icon  { font-size: 20px; width: 34px; flex-shrink: 0; }
    .di-info  { flex: 1; min-width: 0; }
    .di-cat   { font-size: 14px; font-weight: 600; color: #1C1C1E; }
    .di-meta  { font-size: 12px; color: #8E8E93; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .di-right { text-align: right; flex-shrink: 0; margin-left: 8px; }
    .di-amt   { font-size: 15px; font-weight: 700; color: #DC2626; }
    .di-amt.income { color: #16A34A; }
    .di-btns  { display: flex; gap: 4px; margin-top: 4px; justify-content: flex-end; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
    }
    .modal-overlay.show { display: block; }
    .modal {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-radius: 20px 20px 0 0;
      padding: 16px 18px 40px;
      transform: translateY(100%); transition: transform 0.28s cubic-bezier(.32,.72,0,1);
      z-index: 101; max-height: 92vh; overflow-y: auto;
    }
    .modal.show { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: #D1D5DB; border-radius: 2px; margin: 0 auto 14px; }
    .modal-title  { font-size: 17px; font-weight: 700; color: #1E3A5F; margin-bottom: 14px; }

    .form-row { margin-bottom: 11px; }
    .form-row label { display: block; font-size: 12px; color: #6B7280; margin-bottom: 4px; font-weight: 500; }
    .form-row input, .form-row select {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #E2E8F0; border-radius: 9px;
      font-size: 16px; background: white; color: #1C1C1E;
      -webkit-appearance: none; appearance: none;
    }
    .form-row input:focus, .form-row select:focus {
      outline: none; border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .type-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .type-tab {
      flex: 1; padding: 9px 8px; border-radius: 9px;
      border: 1.5px solid #E2E8F0; background: white;
      cursor: pointer; font-size: 14px; font-weight: 600; color: #9CA3AF;
      transition: all 0.15s;
    }
    .type-tab.active-expense { background: #FEF2F2; border-color: #EF4444; color: #DC2626; }
    .type-tab.active-income  { background: #F0FDF4; border-color: #22C55E; color: #15803D; }

    .btn-submit {
      width: 100%; padding: 13px; background: #2563EB; color: white;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 6px; transition: background 0.15s;
    }
    .btn-submit:hover:not(:disabled) { background: #1D4ED8; }
    .btn-submit:disabled { background: #93C5FD; cursor: not-allowed; }
    .btn-cancel {
      width: 100%; padding: 10px; background: none; color: #9CA3AF;
      border: none; font-size: 14px; cursor: pointer; margin-top: 4px;
    }

    .btn-sm {
      padding: 4px 10px; border-radius: 5px;
      border: 1px solid #E2E8F0; background: white;
      font-size: 12px; cursor: pointer; color: #6B7280;
      transition: all 0.12s;
    }
    .btn-sm:hover { background: #F3F4F6; }
    .btn-sm.del   { color: #EF4444; border-color: #FECACA; }
    .btn-sm.del:hover { background: #FEF2F2; }

    .fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: #2563EB; color: white; border: none;
      font-size: 26px; cursor: pointer;
      box-shadow: 0 4px 14px rgba(37,99,235,0.45);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 18px rgba(37,99,235,0.5); }
    .fab:active { transform: scale(0.95); }

    .status-msg { text-align: center; margin-top: 8px; font-size: 13px; color: #6B7280; min-height: 18px; }

    .empty-state {
      text-align: center; padding: 32px 16px; color: #9CA3AF;
    }
    .empty-state .emoji { font-size: 36px; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>📒 記帳工具</h1>
    <div class="month-nav">
      <button onclick="changeMonth(-1)" aria-label="上個月">◀</button>
      <span id="monthLabel"></span>
      <button onclick="changeMonth(1)" aria-label="下個月">▶</button>
    </div>
  </div>

  <div class="summary">
    <div class="summary-card">
      <div class="label">本月支出</div>
      <div class="value expense" id="totalExpense">-</div>
    </div>
    <div class="summary-card">
      <div class="label">本月收入</div>
      <div class="value income" id="totalIncome">-</div>
    </div>
    <div class="summary-card">
      <div class="label">可儲蓄</div>
      <div class="value saving" id="totalSaving">-</div>
    </div>
  </div>

  <div class="calendar">
    <div class="month-weekdays">
      <div class="month-weekday">一</div>
      <div class="month-weekday">二</div>
      <div class="month-weekday">三</div>
      <div class="month-weekday">四</div>
      <div class="month-weekday">五</div>
      <div class="month-weekday">六</div>
      <div class="month-weekday">日</div>
    </div>
    <div class="month-grid" id="monthGrid"></div>
  </div>

  <div id="detailPanel"></div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>

  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">新增記錄</div>

    <div class="type-tabs">
      <button class="type-tab active-expense" id="tabExpense" onclick="setType('expense')">💸 支出</button>
      <button class="type-tab" id="tabIncome"  onclick="setType('income')">💰 收入</button>
    </div>

    <div class="form-row">
      <label for="txDate">日期</label>
      <input id="txDate" type="date" />
    </div>
    <div class="form-row">
      <label for="txAmount">金額（元）</label>
      <input id="txAmount" type="number" min="0" step="1" placeholder="請輸入金額" inputmode="numeric" />
    </div>
    <div class="form-row">
      <label for="txCategory">分類</label>
      <select id="txCategory"></select>
    </div>
    <div class="form-row">
      <label for="txNote">備註（選填）</label>
      <input id="txNote" type="text" placeholder="例如：午餐便當" maxlength="50" />
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitTransaction()">✅ 確認記錄</button>
    <button class="btn-cancel" onclick="closeModal()">取消</button>
    <div class="status-msg" id="submitStatus"></div>
  </div>

  <button class="fab" onclick="openModal(null)" aria-label="新增記錄">＋</button>

<script>
  let currentYear   = new Date().getFullYear();
  let currentMonth  = new Date().getMonth() + 1;
  let allCategories = [];
  let allTxData     = [];
  let editingId     = null;
  let currentTxType = 'expense';
  let selectedDateForDetail = null;

  // ── 日期工具 ──
  function getMonthStr() {
    return currentYear + '-' + String(currentMonth).padStart(2, '0');
  }

  function formatDate(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }

  function todayStr() { return formatDate(new Date()); }

  // ── 月份切換 ──
  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth <  1) { currentMonth = 12; currentYear--; }
    selectedDateForDetail = null;
    document.getElementById('detailPanel').innerHTML = '';
    loadAll();
  }

  // ── 載入資料 ──
  function loadAll() {
    const m = getMonthStr();
    document.getElementById('monthLabel').textContent = m;

    google.script.run
      .withSuccessHandler(function(data) {
        allTxData = data.transactions || [];
        updateSummary();
        renderMonthView();
        // 若已選取日期，重新渲染明細
        if (selectedDateForDetail) {
          const dayTx = allTxData.filter(tx => tx.date === selectedDateForDetail);
          if (dayTx.length > 0) showDayDetail(selectedDateForDetail, dayTx);
          else document.getElementById('detailPanel').innerHTML = '';
        }
      })
      .withFailureHandler(function(err) { console.error('載入月份資料失敗：', err); })
      .getMonthData(m);

    google.script.run
      .withSuccessHandler(function(data) {
        allCategories = data || [];
        updateCategorySelect();
      })
      .withFailureHandler(function(err) { console.error('載入分類失敗：', err); })
      .getCategories();
  }

  // ── 摘要欄 ──
  function updateSummary() {
    let exp = 0, inc = 0;
    allTxData.forEach(tx => {
      if (tx.type === 'expense') exp += Number(tx.amount);
      else                       inc += Number(tx.amount);
    });
    const fmt = n => '$' + n.toLocaleString();
    document.getElementById('totalExpense').textContent = fmt(exp);
    document.getElementById('totalIncome').textContent  = fmt(inc);
    document.getElementById('totalSaving').textContent  = fmt(inc - exp);
  }

  // ── 月曆渲染 ──
  function renderMonthView() {
    const today    = todayStr();
    const firstDay = new Date(currentYear, currentMonth - 1, 1);
    const lastDay  = new Date(currentYear, currentMonth, 0);
    // 週一為第一欄
    const offset     = (firstDay.getDay() === 0) ? 6 : firstDay.getDay() - 1;
    const totalCells = Math.ceil((offset + lastDay.getDate()) / 7) * 7;

    let cells = [];

    // 前置空白格
    for (let i = 0; i < offset; i++) {
      cells.push('<div class="month-day empty-cell"><div class="d-num"></div></div>');
    }

    // 日期格
    for (let day = 1; day <= lastDay.getDate(); day++) {
      const dateStr  = getMonthStr() + '-' + String(day).padStart(2, '0');
      const isToday  = dateStr === today;
      const isFuture = dateStr > today;

      const dayTx  = allTxData.filter(tx => tx.date === dateStr);
      const dayExp = dayTx.filter(tx => tx.type === 'expense').reduce((s, tx) => s + Number(tx.amount), 0);
      const dayInc = dayTx.filter(tx => tx.type === 'income' ).reduce((s, tx) => s + Number(tx.amount), 0);

      let cls = 'month-day';
      if (isToday)       cls += ' today';
      else if (isFuture) cls += ' future';

      const clickAttr = isFuture ? '' : `onclick="handleDayClick('${dateStr}')"`;

      let cell = `<div class="${cls}" ${clickAttr} title="${dateStr}">
        <div class="d-num">${day}</div>
        <div class="d-content">`;
      if (dayExp > 0) cell += `<div class="d-exp">-${dayExp.toLocaleString()}</div>`;
      if (dayInc > 0) cell += `<div class="d-inc">+${dayInc.toLocaleString()}</div>`;
      cell += `</div></div>`;
      cells.push(cell);
    }

    // 尾巴空白格
    while (cells.length < totalCells) {
      cells.push('<div class="month-day empty-cell"><div class="d-num"></div></div>');
    }

    // 週分隔線
    let html = '';
    for (let i = 0; i < cells.length; i++) {
      if (i > 0 && i % 7 === 0) html += '<div class="week-row-line"></div>';
      html += cells[i];
    }

    document.getElementById('monthGrid').innerHTML = html;
  }

  // ── 點擊日期 ──
  function handleDayClick(dateStr) {
    const dayTx = allTxData.filter(tx => tx.date === dateStr);
    if (dayTx.length === 0) {
      openModal(dateStr);
    } else {
      selectedDateForDetail = dateStr;
      showDayDetail(dateStr, dayTx);
    }
  }

  // ── 日期明細 ──
  function showDayDetail(dateStr, dayTx) {
    const catMap = {};
    allCategories.forEach(c => { catMap[c.name] = c.icon; });

    let html = `<div class="detail-panel">
      <div class="detail-header">
        <div class="detail-date">📅 ${dateStr}</div>
        <div class="detail-actions">
          <button class="btn-sm" onclick="openModal('${dateStr}')">＋ 新增</button>
          <button class="btn-sm" onclick="closeDetail()">✕</button>
        </div>
      </div>`;

    if (dayTx.length === 0) {
      html += `<div class="empty-state"><div class="emoji">📭</div><p>今日尚無記錄</p></div>`;
    } else {
      dayTx.forEach(tx => {
        const isIncome = tx.type === 'income';
        const sign     = isIncome ? '+' : '-';
        const amtCls   = isIncome ? ' income' : '';
        const icon     = catMap[tx.category] || '📦';
        html += `<div class="detail-item">
          <div class="di-icon">${icon}</div>
          <div class="di-info">
            <div class="di-cat">${escHtml(tx.category)}</div>
            <div class="di-meta">${escHtml(tx.note) || '無備註'}</div>
          </div>
          <div class="di-right">
            <div class="di-amt${amtCls}">${sign}$${Number(tx.amount).toLocaleString()}</div>
            <div class="di-btns">
              <button class="btn-sm" onclick="editItem('${tx.id}')">編輯</button>
              <button class="btn-sm del" onclick="deleteItem('${tx.id}')">刪除</button>
            </div>
          </div>
        </div>`;
      });
    }

    html += `</div>`;
    const panel = document.getElementById('detailPanel');
    panel.innerHTML = html;
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function closeDetail() {
    selectedDateForDetail = null;
    document.getElementById('detailPanel').innerHTML = '';
  }

  // ── Modal ──
  function openModal(dateStr) {
    editingId = null;
    document.getElementById('modalTitle').textContent  = '新增記錄';
    document.getElementById('txDate').value            = dateStr || todayStr();
    document.getElementById('txAmount').value          = '';
    document.getElementById('txNote').value            = '';
    document.getElementById('submitStatus').textContent = '';
    setType('expense');
    showModal();
    setTimeout(() => document.getElementById('txAmount').focus(), 300);
  }

  function showModal() {
    document.getElementById('modalOverlay').classList.add('show');
    setTimeout(() => document.getElementById('modal').classList.add('show'), 10);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
    setTimeout(() => document.getElementById('modalOverlay').classList.remove('show'), 280);
    editingId = null;
  }

  // ── 收支切換 ──
  function setType(type) {
    currentTxType = type;
    document.getElementById('tabExpense').className =
      'type-tab' + (type === 'expense' ? ' active-expense' : '');
    document.getElementById('tabIncome').className =
      'type-tab' + (type === 'income' ? ' active-income' : '');
    updateCategorySelect();
  }

  function updateCategorySelect() {
    const sel      = document.getElementById('txCategory');
    const filtered = allCategories.filter(c => c.type === currentTxType);
    sel.innerHTML  = filtered
      .map(c => `<option value="${escHtml(c.name)}">${c.icon} ${escHtml(c.name)}</option>`)
      .join('');
    // 若是編輯模式，還原選取值
    if (editingId && sel.dataset.selected) sel.value = sel.dataset.selected;
  }

  // ── 編輯 ──
  function editItem(id) {
    const tx = allTxData.find(t => t.id === id);
    if (!tx) { alert('找不到資料，請重新整理後再試'); return; }
    editingId = tx.id;
    document.getElementById('modalTitle').textContent   = '編輯記錄';
    document.getElementById('txDate').value             = tx.date;
    document.getElementById('txAmount').value           = tx.amount;
    document.getElementById('txNote').value             = tx.note || '';
    document.getElementById('submitStatus').textContent = '';
    setType(tx.type);
    const sel = document.getElementById('txCategory');
    sel.dataset.selected = tx.category;
    sel.value = tx.category;
    showModal();
  }

  // ── 送出 ──
  function submitTransaction() {
    const amountVal = document.getElementById('txAmount').value.trim();
    const amount    = Number(amountVal);
    if (!amountVal || amount <= 0) { alert('請輸入有效的金額'); return; }

    const data = {
      date:     document.getElementById('txDate').value,
      type:     currentTxType,
      amount:   amount,
      category: document.getElementById('txCategory').value,
      note:     document.getElementById('txNote').value.trim(),
    };

    setSubmitting(true);

    const onSuccess = function() {
      setSubmitting(false);
      closeModal();
      loadAll();
    };
    const onFail = function(err) {
      setSubmitting(false);
      document.getElementById('submitStatus').textContent = '❌ ' + err;
    };

    if (editingId) {
      google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onFail)
        .updateTransaction(editingId, data);
    } else {
      google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onFail)
        .addTransaction(data);
    }
  }

  function setSubmitting(busy) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = busy;
    document.getElementById('submitStatus').textContent = busy ? '送出中...' : '';
  }

  // ── 刪除 ──
  function deleteItem(id) {
    if (!confirm('確定要刪除這筆記錄？')) return;
    google.script.run
      .withSuccessHandler(function() {
        closeDetail();
        loadAll();
      })
      .withFailureHandler(err => alert('刪除失敗：' + err))
      .deleteTransaction(id);
  }

  // ── 工具 ──
  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── 鍵盤快捷鍵 ──
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  // ── 初始載入 ──
  loadAll();
</script>
